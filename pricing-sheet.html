<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rugero Agro-vet Daily Ltd | Pricing Sheet</title>
    <style>
        :root {
            --bg: #f2f5f7;
            --card: #ffffff;
            --text: #243746;
            --muted: #5d6d7a;
            --primary: #1f8ef1;
            --border: #d6dee6;
            --success: #1b9c5a;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .wrap { max-width: 1000px; margin: 0 auto; background: var(--card); border-radius: 12px; padding: 24px; box-shadow: 0 8px 22px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
        h1 { margin: 0; font-size: 1.6rem; }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;}
        .back-link:hover { text-decoration: underline; }
        .controls { display: flex; justify-content: space-between; margin-bottom: 16px; gap: 10px; flex-wrap: wrap;}
        .search { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; width: 100%; max-width: 300px; font-size: 0.95rem; }
        .btn { padding: 8px 16px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e7edf2; }
        th { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; font-weight: 700; background: #fbfdff; position: sticky; top: 0;}
        tr:hover { background: #f8fafc; }
        .profit { color: var(--success); font-weight: 600; }
        .status { font-size: 0.9rem; color: var(--muted); margin-bottom: 16px; }
        
        @media print {
            body { background: white; padding: 0; }
            .wrap { box-shadow: none; max-width: 100%; padding: 0; }
            .controls, .back-link { display: none; }
            th { background: white !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="header">
            <div>
                <h1>Internal Pricing & Cost Sheet</h1>
                <p style="margin: 4px 0 0; color: var(--muted); font-size: 0.9rem;">Confidential internal view of purchase prices and expected profit margins.</p>
            </div>
            <a href="admin.html" class="back-link">← Back to Dashboard</a>
        </div>

        <div class="status" id="statusMessage">Checking connection...</div>

        <div class="controls">
            <input type="search" id="searchInput" class="search" placeholder="Search products...">
            <button class="btn" onclick="window.print()">Print / Save PDF</button>
        </div>

        <div class="table-wrap">
            <table id="pricingTable">
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Current Stock</th>
                        <th>Purchase Price (Cost)</th>
                        <th>Selling Price (Unit)</th>
                        <th>Expected Profit / Unit</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./env.js"></script>
    <script src="./supabase-client.js"></script>
    <script>
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const statusMessage = document.getElementById('statusMessage');
        let productsData = [];

        function formatRwf(value) {
            return new Intl.NumberFormat("en-RW", {
                style: "currency",
                currency: "RWF",
                maximumFractionDigits: 0
            }).format(Number(value) || 0);
        }

        // Helper functions mirroring the main dashboard logic
        function productQty(product) {
            const modern = Number(product.product_quantity);
            if (Number.isFinite(modern)) return modern;
            return Number(product.stock) || 0;
        }

        function unitPrice(product) {
            const modern = Number(product.price_per_unit);
            if (Number.isFinite(modern)) return modern;
            return Number(product.price) || 0;
        }

        function avgCostPerUnit(product) {
            const qty = productQty(product);
            const costPool = Number(product.purchase_price) || 0;
            if (qty <= 0) return 0;
            return costPool / qty;
        }

        function renderTable(data) {
            if (!data.length) {
                tableBody.innerHTML = '<tr><td colspan="5">No products found.</td></tr>';
                return;
            }

            tableBody.innerHTML = data.map(product => {
                const name = product.name || "Unnamed";
                const qty = productQty(product);
                const cost = avgCostPerUnit(product);
                const sell = unitPrice(product);
                const profit = sell - cost;
                
                return `
                    <tr>
                        <td style="font-weight: 600;">${name}</td>
                        <td>${qty}</td>
                        <td>${formatRwf(cost)}</td>
                        <td>${formatRwf(sell)}</td>
                        <td class="profit">${formatRwf(profit)}</td>
                    </tr>
                `;
            }).join('');
        }

        async function init() {
            try {
                const supabase = createSupabaseClientOrFail();
                
                // Auth check
                const { data: { session }, error: authError } = await supabase.auth.getSession();
                if (authError || !session) {
                    window.location.href = "login.html";
                    return;
                }

                statusMessage.textContent = "Loading pricing data...";

                const { data, error } = await supabase
                    .from("products")
                    .select("name, product_quantity, stock, price_per_unit, price, purchase_price")
                    .order("name", { ascending: true });

                if (error) throw error;

                productsData = data || [];
                statusMessage.textContent = `${productsData.length} products loaded.`;
                renderTable(productsData);

                // Search functionality
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = productsData.filter(p => 
                        (p.name || "").toLowerCase().includes(term)
                    );
                    renderTable(filtered);
                });

            } catch (error) {
                console.error(error);
                statusMessage.textContent = "Error loading data. Please ensure you are logged in.";
                statusMessage.style.color = "red";
                tableBody.innerHTML = '<tr><td colspan="5">Error loading data.</td></tr>';
            }
        }

        init();
    </script>
</body>
</html>
