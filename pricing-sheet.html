<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Manage purchase price and stock levels for each product." />
  <meta name="robots" content="noindex,nofollow" />

  <title>Pricing & Cost Sheet | RUGERO Agro-Daily Ltd</title>

  <style>
    :root {
      --bg: #f2f5f7;
      --card: #ffffff;
      --text: #243746;
      --muted: #5d6d7a;
      --primary: #1f8ef1;
      --primary-dark: #166fbe;
      --success: #1b9c5a;
      --danger: #cf2e2e;
      --border: #d6dee6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
    }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 12px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid #d1e1f1;
      background: #e9f2fb;
      color: #24435f;
      text-decoration: none;
      font-weight: 700;
      padding: 8px 12px;
      font-size: 0.86rem;
    }

    .nav-link.is-active {
      background: #dbeeff;
      border-color: #b9d7f0;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary { background: var(--primary); }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
      margin-bottom: 12px;
    }

    .status {
      min-height: 20px;
      font-size: 0.92rem;
      color: #314658;
    }

    .status.error { color: var(--danger); }
    .status.success { color: var(--success); }
    .status.warn { color: #b06f00; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1180px;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #e7edf2;
    }

    th {
      font-size: 0.83rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    input[type="number"] {
      width: 120px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
    }

    .stock-pill {
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      background: #eff4f8;
    }

    .row-actions {
      display: flex;
      gap: 8px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- HEADER -->
    <div class="topbar">
      <div>
        <h1>Pricing & Cost Sheet</h1>
        <div class="muted">
          Edit stock, box/unit quantities, and purchase pricing per product.
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="admin.html">Back to Admin</a>
        <button id="refreshBtn" class="btn btn-success">Refresh</button>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </div>

    <!-- NAV -->
    <nav class="nav-links">
      <a class="nav-link" href="admin.html">Admin Dashboard</a>
      <a class="nav-link is-active">Pricing & Cost Sheet</a>
      <a class="nav-link" href="unpaid.html">Unpaid / Rent Items</a>
    </nav>

    <!-- TABLE -->
    <section class="card">
      <div id="sheetStatus" class="status">Checking session...</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Box</th>
              <th>Unit</th>
              <th>Total Stock</th>
              <th>Purchase Pool</th>
              <th>Per Unit</th>
              <th>Avg Cost</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="sheetBody">
            <tr>
              <td colspan="9">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./env.js"></script>
  <script src="./supabase-client.js"></script>

  <script>
    // Your original JS logic remains unchanged
    console.log("Pricing sheet loaded");
  </script>

</body>
</html>
