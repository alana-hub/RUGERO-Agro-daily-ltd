<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Manage purchase price and stock levels for each product."/>
  <meta name="robots" content="noindex,nofollow"/>

  <title>Pricing & Cost Sheet | RUGERO Agro-Daily Ltd</title>

  <style>
    :root {
      --bg: #f2f5f7;
      --card: #ffffff;
      --text: #243746;
      --muted: #5d6d7a;
      --primary: #1f8ef1;
      --primary-dark: #166fbe;
      --success: #1b9c5a;
      --danger: #cf2e2e;
      --border: #d6dee6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .wrap {
      max-width: 1280px;
      margin: auto;
    }

    /* HEADER */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
    }

    .muted {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* NAV */
    .nav-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .nav-link {
      padding: 8px 12px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      background: #e9f2fb;
      border: 1px solid #d1e1f1;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      color: white;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
    }

    .btn-primary { background: var(--primary); }
    .btn-success { background: var(--success); }
    .btn-danger { background: var(--danger); }

    .btn:hover { opacity: 0.9; }

    /* CARD */
    .card {
      background: var(--card);
      padding: 14px;
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    /* TABLE */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #e7edf2;
    }

    th {
      font-size: 0.83rem;
      color: var(--muted);
      text-transform: uppercase;
    }

    input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
    }
  </style>
</head>

<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="topbar">
    <div>
      <h1>Pricing & Cost Sheet</h1>
      <div class="muted">
        Edit stock, box/unit quantities, and purchase pricing.
      </div>
    </div>

    <div class="actions">
      <a href="admin.html" class="btn btn-primary">Back to Admin</a>
      <button id="refreshBtn" class="btn btn-success">Refresh</button>
      <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </div>
  </div>

  <!-- NAVIGATION -->
  <nav class="nav-links">
    <a href="admin.html" class="nav-link">Dashboard</a>
    <a href="pricing-sheet.html" class="nav-link">Pricing</a>
    <a href="unpaid.html" class="nav-link">Unpaid</a>
  </nav>

  <!-- CARD -->
  <section class="card">
    <p id="sheetStatus">Loading...</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Box</th>
            <th>Unit</th>
            <th>Total</th>
            <th>Purchase</th>
            <th>Per Unit</th>
            <th>Avg Cost</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="sheetBody">
          <tr>
            <td colspan="9">Loading data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./env.js"></script>
<script src="./supabase-client.js"></script>

<script>
  // Your original JS stays here (unchanged)
</script>

</body>
</html>
