<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin login page for RUGERO Agro-Daily Ltd Online Shop.">
    <meta name="robots" content="noindex,nofollow">
    <title>RUGERO Agro-Daily Ltd | Admin Login</title>
    <style>
        :root {
            --bg: #1f2a37;
            --card: #ffffff;
            --text: #2c3e50;
            --accent: #25d366;
            --accent-dark: #128c7e;
            --danger: #b00020;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #1f2a37, #2d3f55);
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            width: min(420px, 100%);
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 16px 36px rgba(0,0,0,0.35);
        }

        h1 {
            margin: 0 0 8px;
            color: var(--text);
            font-size: 1.4rem;
        }

        p {
            margin: 0 0 16px;
            color: #546273;
            font-size: 0.95rem;
        }

        label {
            display: block;
            margin: 10px 0 6px;
            color: var(--text);
            font-weight: 600;
            font-size: 0.92rem;
        }

        input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ccd5de;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
        }

        button:hover { background: var(--accent-dark); }
        button:disabled { opacity: 0.65; cursor: not-allowed; }

        .message {
            margin-top: 12px;
            min-height: 20px;
            font-size: 0.92rem;
            color: #2d4052;
        }

        .message.error { color: var(--danger); }

        @media (max-width: 480px) {
            body { padding: 14px; }
            .login-card { padding: 20px 16px; border-radius: 12px; }
            h1 { font-size: 1.25rem; }
            p { font-size: 0.92rem; }
        }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>Admin Login</h1>
        <p>Sign in with your Supabase Auth admin account.</p>

        <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" autocomplete="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" autocomplete="current-password" required>

            <button id="loginBtn" type="submit">Login</button>
            <div id="message" class="message"></div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./env.js"></script>
    <script src="./supabase-client.js"></script>
    <script>
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("loginBtn");
        const messageEl = document.getElementById("message");

        function setMessage(text, isError = false) {
            messageEl.textContent = text;
            messageEl.classList.toggle("error", isError);
        }

        let supabaseClient;
        try {
            supabaseClient = createSupabaseClientOrFail();
        } catch (error) {
            setMessage(error.message || "Missing configuration.", true);
        }

        async function checkExistingSession() {
            if (!supabaseClient) return;
            const { data, error } = await supabaseClient.auth.getSession();
            if (error) {
                setMessage("Session check failed.", true);
                return;
            }

            if (data.session) {
                window.location.href = "admin.html";
            }
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            if (!supabaseClient) {
                setMessage("Missing Supabase configuration.", true);
                return;
            }

            setMessage("");
            loginBtn.disabled = true;
            loginBtn.textContent = "Signing in...";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            if (!email || !password) {
                setMessage("Enter both email and password.", true);
                loginBtn.disabled = false;
                loginBtn.textContent = "Login";
                return;
            }

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    setMessage(error.message || "Login failed.", true);
                    return;
                }

                const { data: sessionData } = await supabaseClient.auth.getSession();
                const userId = sessionData?.session?.user?.id;
                if (!userId) {
                    setMessage("Login failed: missing user session.", true);
                    return;
                }

                const { data: adminRow, error: adminError } = await supabaseClient
                    .from("admin_users")
                    .select("user_id, is_active")
                    .eq("user_id", userId)
                    .eq("is_active", true)
                    .maybeSingle();

                if (adminError || !adminRow) {
                    await supabaseClient.auth.signOut();
                    setMessage("Your account is not authorized for admin access.", true);
                    return;
                }

                setMessage("Login successful. Redirecting...");
                window.location.href = "admin.html";
            } catch (err) {
                console.error(err);
                setMessage("Unexpected login error.", true);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Login";
            }
        });

        checkExistingSession();
    </script>
</body>
</html>
